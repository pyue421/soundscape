<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soundscape Remix Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="ipod-shell">
      <div class="screen-frame">
        <div id="playerHost" class="player-host">
          <div class="screen-placeholder">
            <span class="placeholder-note" aria-hidden="true">♪</span>
            <span>Upload media to start</span>
          </div>
          <section class="controls" id="screenMenu">
            <div class="menu-topbar">
              <span class="menu-top-icon">▶</span>
              <span class="menu-top-title">iPod</span>
              <span class="battery-icon" aria-hidden="true"></span>
            </div>

            <div class="menu-item active">
              <label class="menu-label" for="mediaUpload">Source File</label>
            </div>
            <div class="menu-control">
              <input type="file" id="mediaUpload" accept="audio/*,video/*">
            </div>

            <div class="menu-item">
              <label class="menu-label" for="styleSelect">Style</label>
            </div>
            <div class="menu-control">
              <select id="styleSelect">
                <option value="ambient">Ambient</option>
                <option value="electronic">Electronic</option>
                <option value="orchestral">Orchestral</option>
              </select>
            </div>

            <div class="menu-item">
              <label class="menu-label" for="reactivity">Reactivity</label>
            </div>
            <div class="menu-control">
              <input id="reactivity" type="range" min="0" max="1" value="0.6" step="0.01">
            </div>

            <div class="menu-item">
              <label class="menu-label" for="focus">Frequency Focus</label>
            </div>
            <div class="menu-control">
              <input id="focus" type="range" min="-1" max="1" value="0" step="0.01">
            </div>
          </section>
        </div>
      </div>

      <div class="wheel-wrap">
        <button id="btnMenu" class="wheel-label menu-btn" type="button">menu</button>
        <button id="btnPrev" class="wheel-label prev-btn" type="button" aria-label="Rewind">&lt;&lt;</button>
        <button id="btnNext" class="wheel-label next-btn" type="button" aria-label="Forward">&gt;&gt;</button>
        <button id="btnPlayPause" class="wheel-label play-btn" type="button" aria-label="Play pause" disabled>play/pause</button>
        <span class="ring-divider cut-a" aria-hidden="true"></span>
        <span class="ring-divider cut-b" aria-hidden="true"></span>
        <span class="ring-divider cut-c" aria-hidden="true"></span>
        <span class="ring-divider cut-d" aria-hidden="true"></span>
        <div class="wheel-core" aria-hidden="true"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
